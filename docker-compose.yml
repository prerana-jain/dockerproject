###############################################################################
# docker-compose.yml
# 3-Tier Application: Nginx → Node.js/Express → MySQL 8.0
#
# Usage:
#   cp .env.example .env      # fill in secrets
#   docker compose up --build
###############################################################################

services:

  # ── Database ───────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_net
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - root
        - --password=${MYSQL_ROOT_PASSWORD}
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s   # give MySQL time to initialise on first boot
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT:        ${BACKEND_PORT:-3000}
      DB_HOST:     db
      DB_PORT:     3306
      DB_USER:     ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME:     ${MYSQL_DATABASE}
      NODE_ENV:    production
    depends_on:
      db:
        condition: service_healthy   # wait until MySQL passes its healthcheck
    networks:
      - app_net
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:${BACKEND_PORT:-3000}/health
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      # envsubst replaces ${BACKEND_URL} in nginx.conf.template at startup
      BACKEND_URL: http://backend:${BACKEND_PORT:-3000}
    depends_on:
      backend:
        condition: service_healthy   # wait until backend is accepting requests
    networks:
      - app_net
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost/nginx-health
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  app_net:
    driver: bridge
